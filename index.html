<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Shadow Blade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        #gameContainer { position: relative; width: 1200px; height: 600px; }
        #gameCanvas { display: block; border: 2px solid #e94560; }
        #ui {
            position: absolute; top: 10px; left: 10px;
            color: #e0e0e0; font-size: 14px; pointer-events: none;
            background: rgba(0,0,0,0.6); padding: 8px 12px;
            border-radius: 4px; border: 1px solid #e94560;
        }
        #ui div { margin: 3px 0; }
        #ui span { color: #e94560; font-weight: bold; }
        #cooldowns { margin-top: 6px; border-top: 1px solid #333; padding-top: 6px; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,10,20,0.93);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: #e0e0e0; z-index: 10;
        }
        .overlay h1 {
            font-size: 56px; color: #e94560;
            text-shadow: 0 0 20px #e94560;
            margin-bottom: 10px; letter-spacing: 6px;
        }
        .overlay p { font-size: 15px; color: #aaa; margin-bottom: 6px; }
        .controls-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid #e94560; border-radius: 8px;
            padding: 16px 28px; margin: 16px 0 24px; text-align: center;
        }
        .controls-box h3 { color: #e94560; margin-bottom: 10px; font-size: 17px; }
        .controls-box p { font-size: 13px; color: #ccc; margin: 4px 0; }
        #gameOverScreen h1 { font-size: 64px; text-shadow: 0 0 30px #e94560; margin-bottom: 30px; }
        #stageClearScreen h1 { color: #00ff88; text-shadow: 0 0 20px #00ff88; margin-bottom: 30px; }
        button {
            background: transparent; border: 2px solid #e94560;
            color: #e94560; font-size: 20px; padding: 12px 36px;
            cursor: pointer; font-family: 'Courier New', monospace;
            letter-spacing: 2px; transition: all 0.2s;
            border-radius: 4px; margin: 6px;
        }
        button:hover { background: #e94560; color: #0a0a0a; box-shadow: 0 0 20px #e94560; }
        #nextStageBtn { border-color: #00ff88; color: #00ff88; }
        #nextStageBtn:hover { background: #00ff88; color: #0a0a0a; box-shadow: 0 0 20px #00ff88; }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas" width="1200" height="600"></canvas>
    <div id="ui">
        <div>스테이지: <span id="stageNum">1</span> &nbsp; 라운드: <span id="roundNum">1</span>/3</div>
        <div>남은 적: <span id="enemyCount">0</span></div>
        <div id="cooldowns">
            <div>칼 쿨타임: <span id="swordCool">준비</span></div>
            <div>대쉬 쿨타임: <span id="dashCool">준비</span></div>
        </div>
    </div>
    <div class="overlay" id="startScreen">
        <h1>Shadow Blade</h1>
        <p>현대 배경 암살자 게임</p>
        <div class="controls-box">
            <h3>── 조작법 ──</h3>
            <p>A / D : 좌우 이동</p>
            <p>Space : 점프 (2단 점프 가능)</p>
            <p>AA / DD : 좌/우 대쉬 (쿨타임 0.7초)</p>
            <p>마우스 좌클릭 : 칼 공격 (쿨타임 0.7초)</p>
            <p>대쉬 중 공격 / 공격 중 대쉬 : 돌진 공격</p>
            <p>F : 물건 집기 | F (들고 있을 때) : 마우스 방향으로 던지기</p>
            <p style="color:#e94560;margin-top:8px;">칼로 총알 막기 → 패링 (칼 쿨타임 초기화)</p>
        </div>
        <button id="startBtn">게임 시작</button>
    </div>
    <div class="overlay" id="gameOverScreen" style="display:none;">
        <h1>GAME OVER</h1>
        <button id="restartBtn">다시 시작</button>
    </div>
    <div class="overlay" id="stageClearScreen" style="display:none;">
        <h1>STAGE CLEAR!</h1>
        <button id="nextStageBtn">다음 스테이지</button>
    </div>
</div>

<script>
// =============================================================
//  Shadow Blade - 전체 게임 스크립트
// =============================================================
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = 1200, H = 600;

// ── 상수 ──────────────────────────────────────────────────────
const GRAVITY        = 0.55;
const PLAYER_SPEED   = 5;
const JUMP_FORCE     = -13;
const DASH_SPEED     = 18;
const DASH_DUR       = 160;
const DASH_CD        = 700;
const SWORD_CD       = 700;
const SWORD_DUR      = 220;
const DASH_ATK_SPEED = 26;
const DASH_ATK_DUR   = 240;
const DBL_TAP_WIN    = 300;
const FLOOR_Y        = H - 30;
const THROW_SPEED    = 22;

// ── 전역 상태 ─────────────────────────────────────────────────
let gameState = 'start';
let stage = 1, round = 1;
let mouseX = 300, mouseY = 300;
let platforms = [], walls = [], doors = [];
let enemies   = [], bullets = [], items = [], particles = [];
let lastTime  = 0;

// ── 입력 ──────────────────────────────────────────────────────
const keys = {}, keyTs = {};

document.addEventListener('keydown', function(e) {
    if (e.repeat) return;
    var now = Date.now();
    if ((e.code === 'KeyA' || e.code === 'KeyD') && gameState === 'playing') {
        if (keyTs[e.code] && now - keyTs[e.code] < DBL_TAP_WIN) {
            handleDash(e.code === 'KeyA' ? -1 : 1);
            keyTs[e.code] = 0;
        } else {
            keyTs[e.code] = now;
        }
    }
    if (e.code === 'KeyF' && gameState === 'playing') handlePickupThrow();
    if (e.code === 'Space') e.preventDefault();
    keys[e.code] = true;
});
document.addEventListener('keyup', function(e) { keys[e.code] = false; });
canvas.addEventListener('mousemove', function(e) {
    var r = canvas.getBoundingClientRect();
    mouseX = (e.clientX - r.left) * (W / r.width);
    mouseY = (e.clientY - r.top)  * (H / r.height);
});
canvas.addEventListener('mousedown', function(e) {
    if (e.button === 0 && gameState === 'playing') handleSwordAttack();
});

// ── 유틸 ──────────────────────────────────────────────────────
function rand(a, b)  { return Math.floor(Math.random() * (b - a + 1)) + a; }
function randF(a, b) { return Math.random() * (b - a) + a; }
function dist(a, b)  { return Math.hypot(a.x - b.x, a.y - b.y); }
function overlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}
function segVsRect(x1,y1,x2,y2,rx,ry,rw,rh) {
    function segSeg(p1x,p1y,p2x,p2y,p3x,p3y,p4x,p4y) {
        var d = (p2x-p1x)*(p4y-p3y)-(p2y-p1y)*(p4x-p3x);
        if (!d) return false;
        var t = ((p3x-p1x)*(p4y-p3y)-(p3y-p1y)*(p4x-p3x))/d;
        var u = -((p1x-p2x)*(p3y-p1y)-(p1y-p2y)*(p3x-p1x))/d;
        return t>=0&&t<=1&&u>=0&&u<=1;
    }
    return segSeg(x1,y1,x2,y2, rx,ry,rx+rw,ry)
        || segSeg(x1,y1,x2,y2, rx+rw,ry,rx+rw,ry+rh)
        || segSeg(x1,y1,x2,y2, rx,ry+rh,rx+rw,ry+rh)
        || segSeg(x1,y1,x2,y2, rx,ry,rx,ry+rh);
}

// ── 파티클 ────────────────────────────────────────────────────
function spawnParticles(x, y, color, n) {
    n = n || 8;
    for (var i = 0; i < n; i++) {
        particles.push({
            x:x, y:y,
            vx:randF(-3,3), vy:randF(-4,0.5),
            life:400, max:400, color:color, r:randF(2,4)
        });
    }
}
function spawnBreakParticles(x, y, color) {
    for (var i = 0; i < 18; i++) {
        particles.push({
            x:x, y:y,
            vx:randF(-5,5), vy:randF(-6,1),
            life:550, max:550, color:color, r:randF(2,5)
        });
    }
}
function updateParticles(dt) {
    var alive = [];
    for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life -= dt;
        if (p.life > 0) alive.push(p);
    }
    particles = alive;
}
function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        ctx.save();
        ctx.globalAlpha = p.life / p.max;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }
}

// ── 캐릭터 드로우 함수들 ──────────────────────────────────────

// 플레이어 실루엣
function drawPlayer(pl) {
    var x = pl.x, y = pl.y;
    var fr = pl.facingRight;
    var isDash = pl.dashing || pl.dashAtk;
    var isAtk  = pl.attacking || pl.dashAtk;
    var cx = x + 14;

    ctx.save();

    // 대쉬 잔상 효과
    if (isDash) {
        ctx.shadowColor = '#e94560';
        ctx.shadowBlur  = 20;
    } else {
        ctx.shadowColor = '#5555aa';
        ctx.shadowBlur  = 6;
    }

    // ── 신발 ──
    ctx.fillStyle = '#0a0a0a';
    ctx.beginPath();
    ctx.ellipse(cx + (fr?5:-5), y+46, 8, 4, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + (fr?-4:4), y+46, 6, 3, 0, 0, Math.PI*2);
    ctx.fill();

    // ── 다리 ──
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.roundRect(cx-9, y+28, 8, 18, 3);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(cx+1, y+28, 8, 18, 3);
    ctx.fill();

    // ── 몸통 ──
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.roundRect(cx-10, y+14, 20, 15, 3);
    ctx.fill();

    // ── 코트 자락 ──
    ctx.fillStyle = '#080808';
    ctx.beginPath();
    if (fr) {
        ctx.moveTo(cx-8, y+20);
        ctx.lineTo(cx-13, y+42);
        ctx.lineTo(cx-5,  y+42);
        ctx.lineTo(cx-7,  y+20);
    } else {
        ctx.moveTo(cx+8, y+20);
        ctx.lineTo(cx+13, y+42);
        ctx.lineTo(cx+5,  y+42);
        ctx.lineTo(cx+7,  y+20);
    }
    ctx.closePath();
    ctx.fill();

    // 코트 앞섶
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, y+14);
    ctx.lineTo(cx, y+29);
    ctx.stroke();

    // ── 팔 ──
    ctx.strokeStyle = '#111';
    ctx.lineWidth   = 6;
    ctx.lineCap     = 'round';

    if (isAtk) {
        var atkDir = pl.dashAtk ? pl.dashAtkDir : (mouseX > cx ? 1 : -1);
        var ang = Math.atan2(mouseY - (y+20), mouseX - cx);
        ctx.beginPath();
        ctx.moveTo(cx, y+20);
        ctx.lineTo(cx + Math.cos(ang)*18, y+20 + Math.sin(ang)*18);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx, y+20);
        ctx.lineTo(cx - Math.cos(ang)*12, y+20 + Math.sin(ang)*6);
        ctx.stroke();
    } else {
        ctx.beginPath();
        ctx.moveTo(cx-8, y+18);
        ctx.lineTo(cx - (fr?14:10), y+30);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx+8, y+18);
        ctx.lineTo(cx + (fr?10:14), y+30);
        ctx.stroke();
    }

    // ── 머리 ──
    ctx.fillStyle = '#111';
    ctx.shadowBlur = isDash ? 22 : 10;
    ctx.beginPath();
    ctx.arc(cx, y+8, 10, 0, Math.PI*2);
    ctx.fill();

    // 눈
    ctx.shadowColor = '#ff3355';
    ctx.shadowBlur  = 10;
    ctx.fillStyle   = '#e94560';
    ctx.beginPath();
    ctx.ellipse(cx + (fr?4:-4), y+8, 3, 2, 0, 0, Math.PI*2);
    ctx.fill();

    // ── 칼 ──
    if (isAtk) {
        var atkDir2 = pl.dashAtk ? pl.dashAtkDir : (mouseX > cx ? 1 : -1);
        var ang2 = Math.atan2(mouseY - (y+20), mouseX - cx);
        var ox = cx + Math.cos(ang2)*18;
        var oy = (y+20) + Math.sin(ang2)*18;
        var sLen = pl.dashAtk ? 75 : 58;

        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur  = 16;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth   = 3;
        ctx.lineCap     = 'round';
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(ox + Math.cos(ang2)*sLen, oy + Math.sin(ang2)*sLen);
        ctx.stroke();

        // 칼 가드
        ctx.strokeStyle = 'rgba(180,200,255,0.85)';
        ctx.lineWidth   = 5;
        var gx = ox + Math.cos(ang2)*8;
        var gy = oy + Math.sin(ang2)*8;
        ctx.beginPath();
        ctx.moveTo(gx + Math.cos(ang2+Math.PI/2)*8, gy + Math.sin(ang2+Math.PI/2)*8);
        ctx.lineTo(gx + Math.cos(ang2-Math.PI/2)*8, gy + Math.sin(ang2-Math.PI/2)*8);
        ctx.stroke();

        // 칼끝
        ctx.shadowColor = '#aaddff';
        ctx.shadowBlur  = 14;
        ctx.fillStyle   = '#aaddff';
        ctx.beginPath();
        ctx.arc(ox+Math.cos(ang2)*sLen, oy+Math.sin(ang2)*sLen, 3, 0, Math.PI*2);
        ctx.fill();
    }

    ctx.restore();
}

// 적 실루엣
function drawEnemy(e) {
    if (!e.alive) return;
    var x = e.x, y = e.y;
    var fr = e.facingRight;
    var cx = x + 14;

    ctx.save();
    ctx.shadowColor = 'rgba(50,20,5,0.4)';
    ctx.shadowBlur  = 8;

    // ── 신발 ──
    ctx.fillStyle = '#090909';
    ctx.beginPath();
    ctx.ellipse(cx+(fr?5:-5), y+46, 7, 4, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx+(fr?-4:4), y+46, 6, 3, 0, 0, Math.PI*2);
    ctx.fill();

    // ── 다리 ──
    ctx.fillStyle = '#0e0e0e';
    ctx.beginPath(); ctx.roundRect(cx-9, y+28, 8, 18, 3); ctx.fill();
    ctx.beginPath(); ctx.roundRect(cx+1,  y+28, 8, 18, 3); ctx.fill();

    // ── 몸통 ──
    ctx.fillStyle = '#0e0e0e';
    ctx.beginPath(); ctx.roundRect(cx-10, y+14, 20, 15, 3); ctx.fill();

    // ── 팔 (총 들기) ──
    var gd = fr ? 1 : -1;
    ctx.strokeStyle = '#0e0e0e';
    ctx.lineWidth   = 6;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, y+20);
    ctx.lineTo(cx + gd*18, y+22);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, y+20);
    ctx.lineTo(cx - gd*12, y+28);
    ctx.stroke();

    // ── 총 ──
    ctx.save();
    ctx.translate(cx + gd*18, y+22);
    ctx.rotate(fr ? -0.1 : Math.PI+0.1);
    ctx.fillStyle = '#1c1c1c';
    ctx.shadowColor = '#333'; ctx.shadowBlur = 4;
    ctx.fillRect(-4, -4, 20, 8);   // 총몸
    ctx.fillStyle = '#222';
    ctx.fillRect(16, -3, 8, 5);    // 총구
    ctx.fillRect(2,   4, 6, 8);    // 손잡이
    ctx.restore();

    // ── 머리 ──
    ctx.fillStyle = '#0e0e0e';
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(cx, y+8, 10, 0, Math.PI*2); ctx.fill();

    // 헬멧 테두리
    ctx.fillStyle = '#161616';
    ctx.beginPath(); ctx.ellipse(cx, y+6, 9, 5, 0, 0, Math.PI*2); ctx.fill();

    // 눈 (노란색)
    ctx.shadowColor = '#ffaa00';
    ctx.shadowBlur  = 8;
    ctx.fillStyle   = '#ffaa00';
    ctx.beginPath();
    ctx.ellipse(cx+(fr?4:-4), y+8, 2.5, 2, 0, 0, Math.PI*2);
    ctx.fill();

    // ── 조준선 ──
    if (e.aiState === 'aiming') {
        var blink = e.aimTimer <= 1000;
        var on    = blink ? (Math.floor(e.flashAcc/110) % 2 === 0) : true;
        if (on) {
            ctx.strokeStyle = blink ? '#ff0000' : 'rgba(255,60,60,0.65)';
            ctx.lineWidth   = blink ? 2.5 : 1.5;
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur  = blink ? 12 : 4;
            if (!blink) ctx.setLineDash([7,5]);
            ctx.beginPath();
            ctx.moveTo(cx + gd*26, y+22);
            ctx.lineTo(cx + gd*26 + e.aimDir.x*650, y+22 + e.aimDir.y*650);
            ctx.stroke();
            ctx.setLineDash([]);
        }
    }

    // ── 마크 ──
    if (e.detected && e.aiState !== 'aiming') {
        ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 10;
        ctx.fillStyle   = '#ff4444';
        ctx.font        = 'bold 13px Courier New';
        ctx.fillText('!', cx-4, y-6);
    }
    if (e.aiState === 'aiming') {
        ctx.shadowColor = '#ff2222'; ctx.shadowBlur = 14;
        ctx.fillStyle   = '#ff2222';
        ctx.font        = 'bold 11px Courier New';
        ctx.fillText('AIM', cx-10, y-6);
    }

    ctx.restore();
}

// 술병 드로우
function drawBottle(cx, y, w, h) {
    ctx.save();
    ctx.shadowColor = '#2a8c3a'; ctx.shadowBlur = 5;
    // 병 몸통
    ctx.fillStyle = '#1a5c2a';
    ctx.beginPath();
    ctx.roundRect(cx - w*0.4, y + h*0.3, w*0.8, h*0.65, [0,0,4,4]);
    ctx.fill();
    // 병목
    ctx.fillStyle = '#1e6630';
    ctx.beginPath();
    ctx.roundRect(cx - w*0.2, y + h*0.08, w*0.4, h*0.25, 2);
    ctx.fill();
    // 병뚜껑
    ctx.fillStyle = '#7a3a10';
    ctx.beginPath();
    ctx.roundRect(cx - w*0.25, y, w*0.5, h*0.12, 2);
    ctx.fill();
    // 하이라이트
    ctx.fillStyle = 'rgba(120,255,120,0.12)';
    ctx.beginPath();
    ctx.roundRect(cx - w*0.35, y + h*0.35, w*0.18, h*0.5, 2);
    ctx.fill();
    // 라벨
    ctx.fillStyle = 'rgba(255,230,150,0.55)';
    ctx.fillRect(cx - w*0.3, y + h*0.45, w*0.6, h*0.2);
    ctx.restore();
}

// 꽃병 드로우
function drawVase(cx, y, w, h) {
    ctx.save();
    ctx.shadowColor = '#9955ee'; ctx.shadowBlur = 6;
    // 몸통 (곡선)
    ctx.fillStyle = '#6633aa';
    ctx.beginPath();
    ctx.moveTo(cx - w*0.22, y + h*0.06);
    ctx.lineTo(cx + w*0.22, y + h*0.06);
    ctx.quadraticCurveTo(cx + w*0.65, y + h*0.45, cx + w*0.5, y + h*0.95);
    ctx.lineTo(cx - w*0.5, y + h*0.95);
    ctx.quadraticCurveTo(cx - w*0.65, y + h*0.45, cx - w*0.22, y + h*0.06);
    ctx.closePath();
    ctx.fill();
    // 입구
    ctx.fillStyle = '#8844cc';
    ctx.beginPath();
    ctx.ellipse(cx, y + h*0.06, w*0.28, h*0.07, 0, 0, Math.PI*2);
    ctx.fill();
    // 바닥
    ctx.fillStyle = '#7733bb';
    ctx.beginPath();
    ctx.ellipse(cx, y + h*0.95, w*0.5, h*0.06, 0, 0, Math.PI*2);
    ctx.fill();
    // 꽃 문양
    ctx.fillStyle = 'rgba(255,160,210,0.5)';
    ctx.beginPath(); ctx.arc(cx, y + h*0.5, w*0.2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,230,80,0.65)';
    ctx.beginPath(); ctx.arc(cx, y + h*0.5, w*0.1, 0, Math.PI*2); ctx.fill();
    // 하이라이트
    ctx.strokeStyle = 'rgba(200,150,255,0.18)';
    ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - w*0.12, y + h*0.1);
    ctx.quadraticCurveTo(cx - w*0.45, y + h*0.45, cx - w*0.35, y + h*0.88);
    ctx.stroke();
    ctx.restore();
}

// ══════════════════════════════════════════════════════════════
//  플레이어 객체
// ══════════════════════════════════════════════════════════════
var player = {
    x:80, y:FLOOR_Y-46, w:28, h:46,
    vx:0, vy:0,
    onGround:false, jumpsLeft:2,
    facingRight:true, _spaceHeld:false,
    dashing:false, dashDir:0, dashTimer:0, dashCoolTimer:0,
    attacking:false, attackTimer:0, swordCoolTimer:0,
    dashAtk:false, dashAtkTimer:0, dashAtkDir:0,
    parryActive:false, heldItem:null,

    reset: function() {
        this.x=80; this.y=FLOOR_Y-this.h;
        this.vx=0; this.vy=0;
        this.dashing=false; this.dashAtk=false;
        this.attacking=false; this.parryActive=false;
        this.heldItem=null;
        this.swordCoolTimer=0; this.dashCoolTimer=0;
        this.jumpsLeft=2; this.onGround=false;
    },

    update: function(dt) {
        if (this.dashCoolTimer > 0)  this.dashCoolTimer  -= dt;
        if (this.swordCoolTimer > 0) this.swordCoolTimer -= dt;

        // 이동
        if (this.dashAtk) {
            this.dashAtkTimer -= dt;
            this.vx = this.dashAtkDir * DASH_ATK_SPEED;
            if (this.dashAtkTimer <= 0) { this.dashAtk=false; this.vx=0; }
        } else if (this.dashing) {
            this.dashTimer -= dt;
            this.vx = this.dashDir * DASH_SPEED;
            if (this.dashTimer <= 0) { this.dashing=false; this.vx=0; }
        } else {
            this.vx = 0;
            if (keys['KeyA']) { this.vx = -PLAYER_SPEED; this.facingRight = false; }
            if (keys['KeyD']) { this.vx =  PLAYER_SPEED; this.facingRight = true;  }
        }

        // 점프
        if (keys['Space']) {
            if (!this._spaceHeld && this.jumpsLeft > 0) {
                this.vy = JUMP_FORCE;
                this.jumpsLeft--;
                this._spaceHeld = true;
            }
        } else {
            this._spaceHeld = false;
        }

        this.vy += GRAVITY;
        this.x  += this.vx; this.resolveX();
        this.y  += this.vy; this.resolveY();

        // 칼 타이머
        if (this.attacking) {
            this.attackTimer -= dt;
            this.parryActive  = true;
            if (this.attackTimer <= 0) {
                this.attacking   = false;
                this.parryActive = false;
            }
        }

        // 들고 있는 아이템 따라오기
        if (this.heldItem) {
            this.heldItem.x = this.x + (this.facingRight ? this.w+2 : -this.heldItem.w-2);
            this.heldItem.y = this.y + 10;
        }

        if (this.x < 0)      this.x = 0;
        if (this.x+this.w>W) this.x = W - this.w;
    },

    resolveX: function() {
        var obs = platforms.concat(walls);
        for (var i=0; i<obs.length; i++) {
            var p = obs[i];
            if (overlap(this.x,this.y,this.w,this.h, p.x,p.y,p.w,p.h)) {
                if (this.vx > 0) this.x = p.x - this.w;
                else             this.x = p.x + p.w;
                this.vx = 0;
                if (this.dashing || this.dashAtk) { this.dashing=false; this.dashAtk=false; }
            }
        }
    },

    resolveY: function() {
        this.onGround = false;
        var obs = platforms.concat(walls);
        for (var i=0; i<obs.length; i++) {
            var p = obs[i];
            if (overlap(this.x,this.y,this.w,this.h, p.x,p.y,p.w,p.h)) {
                if (this.vy > 0) {
                    this.y = p.y - this.h;
                    this.vy = 0;
                    this.onGround = true;
                    this.jumpsLeft = 2;
                } else {
                    this.y  = p.y + p.h;
                    this.vy = 0;
                }
            }
        }
        if (this.y+this.h > H) {
            this.y = H - this.h;
            this.vy = 0;
            this.onGround = true;
            this.jumpsLeft = 2;
        }
    },

    getSwordHitbox: function() {
        if (!this.attacking && !this.dashAtk) return null;
        var range = this.dashAtk ? 75 : 58;
        var dir   = this.dashAtk ? this.dashAtkDir : (mouseX > this.x+this.w/2 ? 1 : -1);
        return {
            x: dir>0 ? this.x+this.w : this.x-range,
            y: this.y-12, w:range, h:this.h+24
        };
    },

    draw: function() { drawPlayer(this); }
};

// ══════════════════════════════════════════════════════════════
//  적 클래스
// ══════════════════════════════════════════════════════════════
function Enemy(x, y) {
    this.x=x; this.y=y; this.w=28; this.h=46;
    this.vy=0; this.onGround=false;
    this.facingRight=true; this.alive=true;
    this.detected=false;
    this.aiState='idle';
    this.aimTimer=0; this.aimCooldown=0;
    this.aimDir={x:0,y:0}; this.flashAcc=0;
}

Enemy.prototype.hasLOS = function(px, py) {
    for (var i=0; i<walls.length; i++) {
        var w = walls[i];
        if (segVsRect(this.x+this.w/2, this.y+this.h/2, px, py,
                      w.x, w.y, w.w, w.h)) return false;
    }
    return true;
};

Enemy.prototype.update = function(dt) {
    if (!this.alive) return;

    this.vy += GRAVITY;
    this.y  += this.vy;
    var obs = platforms.concat(walls);
    for (var i=0; i<obs.length; i++) {
        var p = obs[i];
        if (overlap(this.x,this.y,this.w,this.h, p.x,p.y,p.w,p.h)) {
            if (this.vy > 0) { this.y=p.y-this.h; this.vy=0; this.onGround=true; }
            else             { this.y=p.y+p.h;    this.vy=0; }
        }
    }
    if (this.y+this.h > H) { this.y=H-this.h; this.vy=0; this.onGround=true; }

    var px = player.x+player.w/2;
    var py = player.y+player.h/2;
    var los = this.hasLOS(px, py);
    var d   = dist({x:this.x,y:this.y},{x:player.x,y:player.y});

    if (los && d < 720) this.detected = true;
    if (!this.detected) return;

    this.facingRight = px > this.x;

    if (this.aiState === 'idle') {
        if (los) {
            this.aiState  = 'aiming';
            this.aimTimer = 2000;
            this.flashAcc = 0;
        }
    } else if (this.aiState === 'aiming') {
        this.aimTimer -= dt;
        var dx = px-(this.x+this.w/2);
        var dy = py-(this.y+this.h/2);
        var len = Math.hypot(dx,dy) || 1;
        this.aimDir = {x:dx/len, y:dy/len};
        if (this.aimTimer <= 1000) this.flashAcc += dt;
        if (this.aimTimer <= 0) {
            if (los) {
                bullets.push(new Bullet(
                    this.x+this.w/2, this.y+this.h/2,
                    this.aimDir.x, this.aimDir.y, false
                ));
            }
            this.aiState     = 'cooldown';
            this.aimCooldown = rand(1500, 3000);
            this.flashAcc    = 0;
        }
    } else {
        this.aimCooldown -= dt;
        if (this.aimCooldown <= 0) this.aiState = 'idle';
    }
};

Enemy.prototype.draw = function() { drawEnemy(this); };

// ══════════════════════════════════════════════════════════════
//  총알 클래스
// ══════════════════════════════════════════════════════════════
function Bullet(x, y, dx, dy, fromPlayer) {
    this.x=x; this.y=y;
    this.dx=dx; this.dy=dy;
    this.speed = fromPlayer ? 14 : 11;
    this.fromPlayer = fromPlayer;
    this.alive=true; this.r=4;
}

Bullet.prototype.update = function() {
    this.x += this.dx * this.speed;
    this.y += this.dy * this.speed;

    if (this.x<0||this.x>W||this.y<0||this.y>H) { this.alive=false; return; }

    var obs = platforms.concat(walls).concat(doors);
    for (var i=0; i<obs.length; i++) {
        var p = obs[i];
        if (overlap(this.x-this.r, this.y-this.r, this.r*2, this.r*2,
                    p.x, p.y, p.w, p.h)) {
            this.alive = false;
            spawnParticles(this.x, this.y, '#ffcc00', 6);
            return;
        }
    }
};

Bullet.prototype.draw = function() {
    ctx.save();
    ctx.fillStyle   = this.fromPlayer ? '#00ccff' : '#ffcc00';
    ctx.shadowColor = ctx.fillStyle;
    ctx.shadowBlur  = 10;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
};

// ══════════════════════════════════════════════════════════════
//  투척 아이템 클래스
// ══════════════════════════════════════════════════════════════
function ThrowItem(x, y, type) {
    this.x=x; this.y=y;
    this.type = type;
    this.w = (type==='bottle') ? 16 : 20;
    this.h = (type==='bottle') ? 30 : 26;
    this.vx=0; this.vy=0;
    this.alive=true; this.held=false; this.thrown=false;
    this.angle=0;
}

ThrowItem.prototype.breakItem = function() {
    var col = (this.type==='bottle') ? '#44cc66' : '#aa66ff';
    spawnBreakParticles(this.x+this.w/2, this.y+this.h/2, col);
    this.alive = false;
    this.thrown = false;
    if (player.heldItem === this) player.heldItem = null;
};

ThrowItem.prototype.update = function() {
    if (!this.alive) return;
    if (this.held)   return;

    if (this.thrown) {
        // 직선 고속 비행 (중력 없음)
        this.x += this.vx;
        this.y += this.vy;
        this.angle += 0.28;

        if (this.x < 0 || this.x+this.w > W || this.y < 0 || this.y+this.h > H) {
            this.breakItem(); return;
        }
        // 벽/플랫폼 충돌 → 깨짐
        var obs = platforms.concat(walls).concat(doors);
        for (var i=0; i<obs.length; i++) {
            var p = obs[i];
            if (overlap(this.x,this.y,this.w,this.h, p.x,p.y,p.w,p.h)) {
                this.breakItem(); return;
            }
        }
        return;
    }

    // 바닥에 있는 상태
    this.vy += GRAVITY * 0.8;
    this.x  += this.vx;
    this.y  += this.vy;
    this.vx *= 0.97;

    var obs2 = platforms.concat(walls);
    for (var j=0; j<obs2.length; j++) {
        var p2 = obs2[j];
        if (overlap(this.x,this.y,this.w,this.h, p2.x,p2.y,p2.w,p2.h)) {
            if (this.vy > 0) {
                this.y  = p2.y - this.h;
                this.vy *= -0.2;
                this.vx *= 0.6;
            } else {
                this.y  = p2.y + p2.h;
                this.vy = 0;
            }
        }
    }
    if (this.y+this.h > H) { this.y=H-this.h; this.vy*=-0.2; this.vx*=0.6; }
    if (this.x < 0)        { this.x=0;         this.vx*=-0.4; }
    if (this.x+this.w > W) { this.x=W-this.w;  this.vx*=-0.4; }
};

ThrowItem.prototype.draw = function() {
    if (!this.alive) return;
    var cx = this.x + this.w/2;
    var cy = this.y + this.h/2;
    ctx.save();
    ctx.translate(cx, cy);
    if (this.thrown) ctx.rotate(this.angle);
    if (this.type === 'bottle') {
        drawBottle(0, -this.h/2, this.w, this.h);
    } else {
        drawVase(0, -this.h/2, this.w, this.h);
    }
    ctx.restore();
};

// ══════════════════════════════════════════════════════════════
//  행동 핸들러
// ══════════════════════════════════════════════════════════════
function handleDash(dir) {
    if (player.dashCoolTimer > 0) return;
    player.facingRight = (dir > 0);
    if (player.attacking) {
        player.dashAtk    = true;
        player.dashAtkDir = dir;
        player.dashAtkTimer = DASH_ATK_DUR;
        player.attackTimer  = DASH_ATK_DUR;
        player.parryActive  = true;
    } else {
        player.dashing  = true;
        player.dashDir  = dir;
        player.dashTimer= DASH_DUR;
    }
    player.dashCoolTimer = DASH_CD;
}

function handleSwordAttack() {
    if (player.swordCoolTimer > 0) return;
    if (player.dashing) {
        player.dashAtk    = true;
        player.dashAtkDir = player.dashDir;
        player.dashAtkTimer = DASH_ATK_DUR;
        player.dashing = false;
        player.dashCoolTimer = DASH_CD;
    }
    player.attacking    = true;
    player.attackTimer  = SWORD_DUR;
    player.swordCoolTimer = SWORD_CD;
    player.parryActive  = true;
}

function handlePickupThrow() {
    if (player.heldItem) {
        var item = player.heldItem;
        item.held   = false;
        item.thrown = true;
        var dx  = mouseX - (player.x + player.w/2);
        var dy  = mouseY - (player.y + player.h/2);
        var len = Math.hypot(dx, dy) || 1;
        item.vx = (dx/len) * THROW_SPEED;
        item.vy = (dy/len) * THROW_SPEED;
        player.heldItem = null;
    } else {
        for (var i=0; i<items.length; i++) {
            var it = items[i];
            if (!it.alive || it.held) continue;
            if (dist({x:player.x,y:player.y},{x:it.x,y:it.y}) < 72) {
                it.held = true;
                player.heldItem = it;
                break;
            }
        }
    }
}

// ══════════════════════════════════════════════════════════════
//  충돌 검사
// ══════════════════════════════════════════════════════════════
function checkSwordVsEnemies() {
    var hb = player.getSwordHitbox();
    if (!hb) return;
    for (var i=0; i<enemies.length; i++) {
        var e = enemies[i];
        if (!e.alive) continue;
        if (overlap(hb.x,hb.y,hb.w,hb.h, e.x,e.y,e.w,e.h)) {
            e.alive = false;
            spawnParticles(e.x+e.w/2, e.y+e.h/2, '#ff4466', 14);
        }
    }
}

function checkBulletsVsPlayer() {
    for (var i=0; i<bullets.length; i++) {
        var b = bullets[i];
        if (!b.alive || b.fromPlayer) continue;
        if (overlap(b.x-b.r, b.y-b.r, b.r*2, b.r*2,
                    player.x, player.y, player.w, player.h)) {
            if (player.parryActive) {
                b.alive = false;
                player.swordCoolTimer = 0;
                spawnParticles(b.x, b.y, '#00ffcc', 12);
            } else {
                b.alive = false;
                triggerGameOver();
            }
        }
    }
}

function checkItemVsEnemies() {
    for (var i=0; i<items.length; i++) {
        var it = items[i];
        if (!it.alive || !it.thrown) continue;
        for (var j=0; j<enemies.length; j++) {
            var e = enemies[j];
            if (!e.alive) continue;
            if (overlap(it.x,it.y,it.w,it.h, e.x,e.y,e.w,e.h)) {
                e.alive = false;
                spawnParticles(e.x+e.w/2, e.y+e.h/2, '#ff9900', 12);
                it.breakItem();
                break;
            }
        }
    }
}

// ══════════════════════════════════════════════════════════════
//  레벨 생성
// ══════════════════════════════════════════════════════════════
function generateLevel() {
    platforms=[]; walls=[]; doors=[];
    enemies=[]; bullets=[]; items=[]; particles=[];

    // 바닥
    platforms.push({x:0, y:FLOOR_Y, w:W, h:30});

    // 플랫폼
    var np = rand(4,7);
    for (var i=0; i<np; i++) {
        var pw = rand(110,230), ph=18;
        var px = rand(60, W-pw-60);
        var py = rand(180, FLOOR_Y-130);
        var ok = true;
        for (var j=0; j<platforms.length; j++) {
            var p = platforms[j];
            if (overlap(px-10,py-10,pw+20,ph+20, p.x,p.y,p.w,p.h)) { ok=false; break; }
        }
        if (ok) platforms.push({x:px,y:py,w:pw,h:ph});
    }

    // 벽 + 문
    var nw = rand(2,4);
    for (var i=0; i<nw; i++) {
        var wx = rand(160, W-200);
        var tooClose = false;
        for (var j=0; j<walls.length; j++) {
            if (Math.abs(walls[j].x - wx) < 90) { tooClose=true; break; }
        }
        if (tooClose) continue;
        var totalH = rand(120,210);
        var doorH  = 62;
        var topH   = totalH - doorH;
        var wy     = FLOOR_Y - totalH;
        walls.push({x:wx, y:wy,      w:16, h:topH});
        doors.push({x:wx, y:wy+topH, w:16, h:doorH});
    }

    // 적
    var ne=rand(2,5), placed=0, tries=0;
    while (placed<ne && tries<120) {
        tries++;
        var ex = rand(220, W-60);
        if (Math.abs(ex-100) < 180) continue;
        enemies.push(new Enemy(ex, FLOOR_Y-46));
        placed++;
    }

    // 아이템
    var ni = rand(1,2);
    var types = ['bottle','vase'];
    for (var i=0; i<ni; i++) {
        var t  = types[i%2];
        var ih = (t==='bottle') ? 30 : 26;
        items.push(new ThrowItem(rand(120,W-80), FLOOR_Y-ih, t));
    }

    player.reset();
}

// ══════════════════════════════════════════════════════════════
//  화면 전환
// ══════════════════════════════════════════════════════════════
function triggerGameOver() {
    gameState = 'gameover';
    document.getElementById('gameOverScreen').style.display = 'flex';
}
function startGame() {
    stage=1; round=1;
    generateLevel();
    gameState='playing';
}
function nextRound() {
    round++;
    if (round > 3) {
        round=1; stage++;
        gameState='stageclear';
        document.getElementById('stageClearScreen').style.display='flex';
    } else {
        generateLevel();
    }
}

// ══════════════════════════════════════════════════════════════
//  배경 드로우
// ══════════════════════════════════════════════════════════════
function drawBG() {
    ctx.fillStyle = '#16162a';
    ctx.fillRect(0,0,W,H);

    // 배경 창문
    ctx.fillStyle = 'rgba(255,210,90,0.025)';
    for (var i=0; i<7; i++) {
        for (var j=0; j<4; j++) {
            ctx.fillRect(40+i*170, 10+j*110, 70, 65);
        }
    }

    // 플랫폼
    for (var i=0; i<platforms.length; i++) {
        var p = platforms[i];
        var isFloor = (p.y === FLOOR_Y);
        ctx.fillStyle = isFloor ? '#2a2a40' : '#323250';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = isFloor ? '#50507a' : '#606090';
        ctx.fillRect(p.x, p.y, p.w, 3);
    }

    // 벽
    for (var i=0; i<walls.length; i++) {
        var w = walls[i];
        ctx.fillStyle = '#1c1c2e';
        ctx.fillRect(w.x, w.y, w.w, w.h);
        ctx.fillStyle = '#3a3a5a';
        ctx.fillRect(w.x, w.y, 3, w.h);
        ctx.fillRect(w.x+w.w-3, w.y, 3, w.h);
    }

    // 문 (통과 가능)
    for (var i=0; i<doors.length; i++) {
        var d = doors[i];
        ctx.fillStyle = 'rgba(70,45,20,0.28)';
        ctx.fillRect(d.x, d.y, d.w, d.h);
        ctx.strokeStyle = '#554422';
        ctx.lineWidth = 1;
        ctx.setLineDash([4,3]);
        ctx.strokeRect(d.x, d.y, d.w, d.h);
        ctx.setLineDash([]);
    }
}

function updateUI() {
    document.getElementById('stageNum').textContent  = stage;
    document.getElementById('roundNum').textContent  = round;
    var alive = 0;
    for (var i=0; i<enemies.length; i++) if (enemies[i].alive) alive++;
    document.getElementById('enemyCount').textContent = alive;
    var sc = player.swordCoolTimer, dc = player.dashCoolTimer;
    document.getElementById('swordCool').textContent = sc>0 ? (sc/1000).toFixed(1)+'s' : '준비';
    document.getElementById('dashCool').textContent  = dc>0 ? (dc/1000).toFixed(1)+'s' : '준비';
}

// ══════════════════════════════════════════════════════════════
//  메인 루프
// ══════════════════════════════════════════════════════════════
function gameLoop(ts) {
    var dt = Math.min(ts - lastTime, 50);
    lastTime = ts;
    ctx.clearRect(0,0,W,H);

    if (gameState === 'playing') {
        // 업데이트
        player.update(dt);
        for (var i=0; i<enemies.length; i++) enemies[i].update(dt);
        for (var i=0; i<bullets.length; i++) bullets[i].update();
        for (var i=0; i<items.length;   i++) items[i].update();
        updateParticles(dt);

        // 충돌
        checkSwordVsEnemies();
        checkBulletsVsPlayer();
        checkItemVsEnemies();

        // 정리
        var newBullets=[], newItems=[];
        for (var i=0;i<bullets.length;i++) if(bullets[i].alive) newBullets.push(bullets[i]);
        for (var i=0;i<items.length;  i++) if(items[i].alive || items[i].held) newItems.push(items[i]);
        bullets=newBullets; items=newItems;

        // 라운드 클리어
        if (enemies.length > 0) {
            var allDead = true;
            for (var i=0; i<enemies.length; i++) if(enemies[i].alive){allDead=false;break;}
            if (allDead) nextRound();
        }

        // 그리기
        drawBG();
        for (var i=0; i<items.length;   i++) items[i].draw();
        for (var i=0; i<enemies.length; i++) enemies[i].draw();
        player.draw();
        for (var i=0; i<bullets.length; i++) bullets[i].draw();
        drawParticles();
        updateUI();

    } else {
        drawBG();
    }

    requestAnimationFrame(gameLoop);
}

// ── 버튼 이벤트 ───────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', function() {
    document.getElementById('startScreen').style.display='none';
    startGame();
});
document.getElementById('restartBtn').addEventListener('click', function() {
    document.getElementById('gameOverScreen').style.display='none';
    startGame();
});
document.getElementById('nextStageBtn').addEventListener('click', function() {
    document.getElementById('stageClearScreen').style.display='none';
    generateLevel();
    gameState='playing';
});

// 루프 시작
requestAnimationFrame(function(ts){ lastTime=ts; requestAnimationFrame(gameLoop); });
</script>
</body>
</html>
